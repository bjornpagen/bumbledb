[workspace]
members = [
    "crates/bumbledb",
    "crates/bumbledb-bench",
    "crates/bumbledb-core",
    "crates/bumbledb-lmdb",
    "crates/bumbledb-test-support",
]
resolver = "3"

[workspace.package]
edition = "2024"
rust-version = "1.96"

[workspace.dependencies]
bumbledb-core = { path = "crates/bumbledb-core" }
bumbledb-lmdb = { path = "crates/bumbledb-lmdb" }
blake3 = "1.8.2"
csv = "1.4.0"
heed = { version = "0.22.1", default-features = false }
proptest = "1.9.0"
rusqlite = { version = "0.37.0", features = ["bundled"] }
smallvec = "1.15.1"
tempfile = "3.23.0"
thiserror = "2.0.17"
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter", "fmt", "json"] }
trybuild = "1.0.114"

[workspace.lints.rust]
unused = "deny"
unused_must_use = "deny"
unfulfilled_lint_expectations = "deny"
unsafe_op_in_unsafe_fn = "deny"

[workspace.lints.clippy]
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
unreachable = "deny"
dbg_macro = "deny"
undocumented_unsafe_blocks = "deny"
redundant_clone = "warn"
unnecessary_to_owned = "warn"
needless_collect = "warn"
large_stack_arrays = "warn"
box_collection = "warn"
vec_box = "warn"
