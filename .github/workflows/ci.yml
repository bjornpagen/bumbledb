# The CI spine (the crucible packet (git ecec1dc3)). Four lanes on
# macos arm64 (macos-latest is M-series): the workspace gate, the
# corpus-replay lane, and the Lean gate per push; the Miri lane on a
# nightly cron.
# The SDK lane (the hardening-0.3.0 packet, PRD T6) joins them as the
# fifth: both halves of the cross-host fingerprint lock, per push.
# The check and corpus-replay lanes run on ubuntu-latest (x86_64-linux)
# as well as macos (the cleanup-0.5.0 packet, PRD U4): the first real
# execution of the engine's linux arms and of the scalar-fallback
# promise (docs/architecture/00-product.md — other 64-bit platforms
# compile and run scalar fallback correctly, no performance promises).
# The suite is linux-clean by construction: every host-pinned falsifier
# is #[ignore]d and every macos-only integration binary is whole-file
# cfg(target_os = "macos"). The lean lane could run anywhere but stays
# put; the sdk lane REQUIRES darwin-arm64 (below); the miri lane's
# native pass is the reference host's.
#
# Wall-time record (measured locally on the pinned M2 Max, 2026-07-13):
#   * corpus-replay lane: 463 s test wall (the query three-way replay
#     dominates at ~400 s) + fuzz-crate build.
#   * Miri lane: 752 s ≈ 12.5 min — OVER the 10-minute per-push budget,
#     hence the cron (the "measure first, decide by the number" rule).
#   * check lane: 178 s local wall (scripts/check.sh, warm build).
#   Per-push wall = max(check, corpus-replay) since the lanes run in
#   parallel: estimated under 15 minutes with warm caches; the first
#   run on a cold cache (toolchain download + full builds) will exceed
#   it once.
#
# Deliberate exclusions (each per the measurement discipline,
# docs/architecture/60-validation.md):
#   * NO benches: timing on a shared virtualized runner is noise; every
#     pinned margin is measured locally on the M2 Max.
#   * NO asm gates (scripts/check-asm.sh): aarch64 codegen inspection
#     is a local gate for the same reason — runner codegen/toolchain
#     drift would make it flaky without making it informative.
#   * NO long fuzz sessions and NO ASAN lane: firepower is
#     scripts/fuzz.sh on the owner's machine (the human work register);
#     CI replays the checked-in corpus deterministically instead —
#     every corpus entry a local session banked is thereafter
#     CI-guarded.
name: ci

on:
  # Scoped to main + PRs (the cleanup-0.5.0 packet, PRD U4): a WIP push
  # to a PR-less worktree branch no longer burns five macOS lanes.
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Nightly Miri lane only (see the job-level `if`): 09:17 UTC.
    - cron: "17 9 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lane 1 — the workspace gate: exactly scripts/check.sh (fmt, clippy
  # -D warnings, workspace tests + doctests, the release alloc gate,
  # the fold-off matrix build from PRD 13, the bench-crate obs config).
  # Both runners run the identical script; on ubuntu the run itself IS
  # the x86-64 scalar-fallback and linux-arm coverage (the cross
  # `cargo check` that used to self-skip at the end of check.sh died
  # superseded — executing the tests is strictly stronger).
  check:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: install the pinned toolchain
        # rust-toolchain.toml owns the channel (nightly-2026-07-12) and
        # components; `rustup show` resolves and installs it.
        run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - run: scripts/check.sh

  # Lane 2 — corpus replay: NOT libFuzzer-in-CI (fork mode and long
  # sessions do not belong here). Plain `cargo test` in the detached
  # fuzz crate iterates every checked-in corpus and trophy entry
  # through the runner functions directly (fuzz/tests/), so the
  # accumulated corpus replays deterministically on every push.
  corpus-replay:
    if: github.event_name != 'schedule'
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: install the pinned toolchain
        run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: replay-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'fuzz/Cargo.lock') }}
      - run: cargo test
        working-directory: fuzz

  # Lane 3 — Miri, both interpretation targets (native arm64 + the
  # x86_64-linux cross-interpretation): 752 s ≈ 12.5 min measured
  # locally (2026-07-13, M2 Max, warm sysroot), over the 10-minute
  # per-push budget — so it runs on the nightly cron (and on manual
  # dispatch), not per push.
  miri:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v5
      - name: install the pinned toolchain
        run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: miri-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - run: scripts/miri.sh

  # Lane 4 — the Lean gate (the covenant campaign, PRD 01; census
  # added by PRD 10; the conformance lane by PRD 13): elan installs the
  # toolchain pinned in lean/lean-toolchain, then scripts/lean.sh runs
  # `lake build` (the conformance exe is a default target), the
  # placeholder battery, scripts/spec-census.sh (the Bridge ledger's
  # mechanism/instrument tokens against crates/ and fuzz/, the docs'
  # lean/ citations against the tree), and the conformance corpus run
  # (`lake exe conformance` over lean/conformance/cases — the
  # executable denotation vs the recorded engine answers).
  # Per push — the build is seconds at this size; if it exceeds
  # 2 minutes by campaign end, PRD 14 moves it to the Miri cron and
  # records the number.
  lean:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/cache@v5
        with:
          path: |
            ~/.elan
            lean/.lake
          key: lean-${{ runner.os }}-${{ hashFiles('lean/lean-toolchain') }}
      - name: install elan (the pinned Lean toolchain)
        # lean/lean-toolchain owns the exact version; elan resolves and
        # installs it on first `lake` invocation inside lean/. On a
        # cache hit the toolchain is already present and this step is
        # a no-op beyond PATH.
        run: |
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -s -- -y --default-toolchain none
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
      - run: scripts/lean.sh
      # The three-way conformance comparator (PRD 13): per checked-in
      # case, replayed from its recorded provenance, the engine fresh +
      # the naive model fresh, byte-held to the corpus file, then
      # `lake exe conformance` — engine vs naive vs the Lean
      # denotation; a disagreement names the case file and is a trophy
      # (triage per the fuzzing charter). Placed HERE per the measured
      # numbers (2026-07-14, pinned M2 Max, debug build): 12.4 s
      # engine+naive replay + 1.2 s Lean corpus run — the per-push
      # budget holds; the cost is the bench-crate build, which the
      # cargo cache absorbs.
      - name: install the pinned Rust toolchain (for the comparator)
        run: rustup show
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lean-conformance-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - name: the three-way conformance comparator
        run: cargo test -p bumbledb-bench three_way_conformance -- --ignored --nocapture

  # Lane 5 — the SDK lane (the hardening-0.3.0 packet, PRD T6): both
  # halves of the cross-host fingerprint lock, per push. The TS half is
  # the full SDK gate exactly as run locally — build the napi bridge +
  # package from source, then tsc, biome, and `pnpm test` (the ONE
  # test-glob spelling — package.json's `test` script; the rebuild it
  # fronts is incremental after the named build step; test/fixtures/*.ts
  # are spawned-child helpers, never tests). The Rust half is `cargo test` against ts/crate — the crate
  # is workspace-excluded, so the root workspace gate (lane 1) never
  # reaches it; this step is what executes
  # ts/crate/src/fingerprint_lock.rs. The T5 per-recipe goldens run
  # inside the two suites by construction.
  # Runner: macos-latest (M-series arm64) is REQUIRED, not just house
  # style — ts/scripts/build.ts hardcodes the darwin-arm64 platform
  # package and smoke-loads the .node it just built, so the runner arch
  # must BE darwin-arm64.
  # Runtime budget (measured locally on the pinned M2 Max, 2026-07-18,
  # warm caches): pnpm run build 15.6 s (the bridge release compile
  # dominates) + tsc 1.4 s + biome 1.3 s + node --test 0.9 s + ts/crate
  # cargo test 9.7 s ≈ 29 s of work; a cold cache pays the toolchain
  # download and the full dependency builds once. Runs `needs:`-free in
  # parallel with the engine lanes, never gated behind them.
  sdk:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
      - name: install the pinned toolchain
        # rust-toolchain.toml at the repo root owns the channel for
        # ts/crate too: the crate is workspace-excluded but sits under
        # the root, and rustup resolves the toolchain file by walking
        # up from cwd, not from the manifest path.
        run: rustup show
      - uses: actions/setup-node@v5
        with:
          # ts/package.json engines pins node >=24 (the build script
          # and the tests run as .ts through native type stripping).
          node-version: 24
      - name: install pnpm
        # ts/package.json#packageManager (pnpm@11.9.0) owns the exact
        # version; corepack reads and activates that pin.
        run: corepack enable pnpm
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ts/crate/target
          key: sdk-cargo-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'ts/crate/Cargo.lock') }}
      - name: resolve the pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"
        working-directory: ts
      - uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: sdk-pnpm-${{ runner.os }}-${{ hashFiles('ts/pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
        working-directory: ts
      - name: build the napi bridge + SDK from source
        run: pnpm run build
        working-directory: ts
      - run: pnpm exec tsc --noEmit
        working-directory: ts
      - run: pnpm exec biome check .
        working-directory: ts
      - run: pnpm test
        working-directory: ts
      - name: the Rust half of the lock (fingerprint_lock.rs)
        run: cargo test --manifest-path ts/crate/Cargo.toml
