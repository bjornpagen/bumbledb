# The CI spine (docs/prd-crucible/16-ci-firepower.md). Three lanes on
# macos arm64 (macos-latest is M-series): the workspace gate and the
# corpus-replay lane per push; the Miri lane on a nightly cron.
#
# Wall-time record (measured locally on the pinned M2 Max, 2026-07-13):
#   * corpus-replay lane: 463 s test wall (the query three-way replay
#     dominates at ~400 s) + fuzz-crate build.
#   * Miri lane: 752 s ≈ 12.5 min — OVER the 10-minute per-push budget,
#     hence the cron (the "measure first, decide by the number" rule).
#   * check lane: 178 s local wall (scripts/check.sh, warm build).
#   Per-push wall = max(check, corpus-replay) since the lanes run in
#   parallel: estimated under 15 minutes with warm caches; the first
#   run on a cold cache (toolchain download + full builds) will exceed
#   it once. First-run verification on a real push: pending (this
#   workflow cannot be exercised from the local machine).
#
# Deliberate exclusions (each per the measurement discipline,
# docs/architecture/60-validation.md):
#   * NO benches: timing on a shared virtualized runner is noise; every
#     pinned margin is measured locally on the M2 Max.
#   * NO asm gates (scripts/check-asm.sh): aarch64 codegen inspection
#     is a local gate for the same reason — runner codegen/toolchain
#     drift would make it flaky without making it informative.
#   * NO long fuzz sessions and NO ASAN lane: firepower is
#     scripts/fuzz.sh on the owner's machine (the human work register);
#     CI replays the checked-in corpus deterministically instead —
#     every corpus entry a local session banked is thereafter
#     CI-guarded.
name: ci

on:
  push:
  workflow_dispatch:
  schedule:
    # Nightly Miri lane only (see the job-level `if`): 09:17 UTC.
    - cron: "17 9 * * *"

env:
  CARGO_TERM_COLOR: always

jobs:
  # Lane 1 — the workspace gate: exactly scripts/check.sh (fmt, clippy
  # -D warnings, workspace tests + doctests, the release alloc gate,
  # the fold-off matrix build from PRD 13, the bench-crate obs config).
  # The x86_64-linux cross check inside it self-reports SKIPPED where
  # the cross C compiler is absent — a skip, not a verdict, on the
  # runner as locally.
  check:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: install the pinned toolchain
        # rust-toolchain.toml owns the channel (nightly-2026-07-12) and
        # components; `rustup show` resolves and installs it.
        run: rustup show
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - run: scripts/check.sh

  # Lane 2 — corpus replay: NOT libFuzzer-in-CI (fork mode and long
  # sessions do not belong here). Plain `cargo test` in the detached
  # fuzz crate iterates every checked-in corpus and trophy entry
  # through the runner functions directly (fuzz/tests/), so the
  # accumulated corpus replays deterministically on every push.
  corpus-replay:
    if: github.event_name != 'schedule'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: install the pinned toolchain
        run: rustup show
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            fuzz/target
          key: replay-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'fuzz/Cargo.lock') }}
      - run: cargo test
        working-directory: fuzz

  # Lane 3 — Miri, both interpretation targets (native arm64 + the
  # x86_64-linux cross-interpretation): 752 s ≈ 12.5 min measured
  # locally (2026-07-13, M2 Max, warm sysroot), over the 10-minute
  # per-push budget — so it runs on the nightly cron (and on manual
  # dispatch), not per push.
  miri:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
      - name: install the pinned toolchain
        run: rustup show
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: miri-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
      - run: scripts/miri.sh
